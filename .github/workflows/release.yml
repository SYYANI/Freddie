name: Publish DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      APP_NAME: Freddie
      PROJECT_PATH: ReadPaper.xcodeproj
      SCHEME: ReadPaper
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Freddie.app
      DMG_PATH: build/Freddie-unsigned.dmg
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      LOCAL_READABILITY_REPO: https://github.com/SYYANI/swift-readability.git
      LOCAL_READABILITY_REF: 6d98afef8c2c0cc7f6055bdb74e0fd01b49e4729
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Environment Versions
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore local package dependency
        run: |
          if [ ! -d swift-readability ]; then
            git clone "$LOCAL_READABILITY_REPO" swift-readability
          fi
          git -C swift-readability fetch --depth 1 origin "$LOCAL_READABILITY_REF"
          git -C swift-readability checkout --detach "$LOCAL_READABILITY_REF"

      - name: Install build tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Verify app bundle
        run: |
          test -d "$APP_PATH"
          ls -la "$APP_PATH"

      - name: Create DMG
        run: |
          rm -f "$DMG_PATH"
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 200 190 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 600 185 \
            "$DMG_PATH" \
            "$APP_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: Freddie-unsigned-dmg
          path: build/Freddie-unsigned.dmg

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p build

          current_tag="$GITHUB_REF_NAME"
          previous_tag="$(
            git tag --merged HEAD --sort=-creatordate \
              | grep -Fxv "$current_tag" \
              | head -n 1
          )"

          {
            echo "## What's Changed"
            echo

            if [ -n "$previous_tag" ]; then
              git log --no-merges --reverse --pretty=format:'- %s (%h)' "${previous_tag}..${current_tag}"
            else
              echo "- Initial release"
            fi

            echo
            echo

            if [ -n "$previous_tag" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              echo "First public release for \`${current_tag}\`."
            fi
          } > build/release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: build/Freddie-unsigned.dmg
          name: ${{ github.ref_name }}
          body_path: build/release-notes.md
